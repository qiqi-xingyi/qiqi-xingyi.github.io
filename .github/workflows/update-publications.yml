name: Update publications from Google Scholar

# Runs weekly (and on-demand) to refresh data/publications.json from Scholar
# via SerpApi, then commits the result so GitHub Pages redeploys automatically.
on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC — adjust as you like
  workflow_dispatch: {}    # lets you trigger it by hand from the Actions tab

# Allow the workflow to push the regenerated JSON back to the repo.
permissions:
  contents: write

# If a manual run starts while the weekly one is going, don't clash.
concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch from Google Scholar (SerpApi)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/fetch_scholar.py

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain data/publications.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/publications.json
            git commit -m "chore: auto-update publications from Google Scholar"
            git push
            echo "Publications updated."
          else
            echo "No changes — publications already up to date."
          fi
